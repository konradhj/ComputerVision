# IDUN v3 — DenseNet121 with v2's regularization settings
# Rationale: v1 DenseNet had better accuracy, v2 had better AUROC
# This combines DenseNet121 with label smoothing, stronger weight decay, more augmentation
# Usage: python scripts/train.py --config configs/idun_v3.yaml

# --- Data ---
data:
  root_dir: "/cluster/projects/vc/courses/TDT17/mic/ODELIA2025/data/"
  split_csv: "/cluster/projects/vc/courses/TDT17/mic/ODELIA2025/split_unilateral.csv"
  label_csv: "auto"
  sequences: ["Pre", "Post_1", "Post_2", "T2"]
  spatial_size: [128, 128, 32]
  fold: 0
  num_workers: 8
  batch_size: 4

# --- Model ---
model:
  architecture: "densenet121"       # Back to DenseNet121 (better accuracy than ResNet18)
  in_channels: 4
  num_classes: 3
  dropout: 0.2                      # Changed: add dropout to reduce overfitting
  pretrained: false

# --- Training ---
training:
  epochs: 100
  learning_rate: 5.0e-5             # From v2: slower learning
  weight_decay: 1.0e-4              # From v2: stronger regularization
  optimizer: "adamw"
  scheduler: "cosine"
  scheduler_patience: 10
  early_stopping_patience: 25       # Changed: even more patience
  mixed_precision: true
  class_weights: null
  label_smoothing: 0.1              # From v2: helps with rare classes

# --- Augmentation (from v2, stronger) ---
augmentation:
  rand_flip_prob: 0.5
  rand_rotate90_prob: 0.5
  rand_affine_prob: 0.5
  rand_affine_rotate_range: 0.2618
  rand_affine_scale_range: [0.85, 1.15]
  rand_intensity_shift: 0.15
  rand_intensity_scale: 0.15

# --- Calibration ---
calibration:
  enabled: false
  temperature_init: 1.5

# --- Evaluation ---
evaluation:
  sensitivity_threshold: 0.9
  specificity_threshold: 0.9

# --- Paths ---
paths:
  output_dir: "/cluster/work/konradj/breast_mri/outputs_v3/"
  checkpoint_dir: "/cluster/work/konradj/breast_mri/outputs_v3/checkpoints/"
  log_dir: "/cluster/work/konradj/breast_mri/outputs_v3/logs/"

# --- Reproducibility ---
seed: 42
device: "auto"
