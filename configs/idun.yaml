# IDUN configuration — paths point to shared course data
# Usage: python scripts/train.py --config configs/idun.yaml

# --- Data ---
data:
  root_dir: "/cluster/projects/vc/courses/TDT17/mic/ODELIA2025/"
  split_csv: "split_unilateral.csv"   # TODO: confirm location — may be inside the data root
  label_csv: "labels.csv"             # TODO: confirm location and filename
  sequences: ["Pre", "Post_1", "Post_2", "T2"]
  spatial_size: [128, 128, 32]
  fold: 0
  num_workers: 8                      # matches --cpus-per-task=8 in train.slurm
  batch_size: 4

# --- Model ---
model:
  architecture: "densenet121"
  in_channels: 4
  num_classes: 3
  dropout: 0.0
  pretrained: false

# --- Training ---
training:
  epochs: 100
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  optimizer: "adamw"
  scheduler: "cosine"
  scheduler_patience: 10
  early_stopping_patience: 15
  mixed_precision: true
  class_weights: null
  label_smoothing: 0.0

# --- Augmentation ---
augmentation:
  rand_flip_prob: 0.5
  rand_rotate90_prob: 0.5
  rand_affine_prob: 0.3
  rand_affine_rotate_range: 0.1745
  rand_affine_scale_range: [0.9, 1.1]
  rand_intensity_shift: 0.1
  rand_intensity_scale: 0.1

# --- Calibration ---
calibration:
  enabled: false
  temperature_init: 1.5

# --- Evaluation ---
evaluation:
  sensitivity_threshold: 0.9
  specificity_threshold: 0.9

# --- Paths (write to /cluster/work/ to avoid filling home quota) ---
paths:
  output_dir: "/cluster/work/konradj/breast_mri/outputs/"
  checkpoint_dir: "/cluster/work/konradj/breast_mri/outputs/checkpoints/"
  log_dir: "/cluster/work/konradj/breast_mri/outputs/logs/"

# --- Reproducibility ---
seed: 42
device: "auto"
