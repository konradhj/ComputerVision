# IDUN v13 — Inspired by official ODELIA baseline
# Key insight: challenge organizers use Sub_1 ONLY at 224x224x32
# Plus: oversampling instead of class weights, z-score normalization

# --- Data ---
data:
  root_dir: "/cluster/projects/vc/courses/TDT17/mic/ODELIA2025/data/"
  split_csv: "/cluster/projects/vc/courses/TDT17/mic/ODELIA2025/split_unilateral.csv"
  label_csv: "auto"
  sequences: ["Sub_1"]                # Single channel — matches ODELIA baseline
  spatial_size: [224, 224, 32]        # Higher res — matches ODELIA baseline
  fold: -1
  num_workers: 8
  batch_size: 8

# --- Model ---
model:
  architecture: "densenet121"
  in_channels: 1
  num_classes: 3
  dropout: 0.3
  pretrained: false

# --- Training ---
training:
  epochs: 200
  learning_rate: 5.0e-5
  weight_decay: 1.0e-4
  optimizer: "adamw"
  scheduler: "cosine"
  scheduler_patience: 10
  early_stopping_patience: 30
  mixed_precision: true
  class_weights: [1.0, 1.0, 1.0]     # Equal weights — oversampling handles imbalance
  label_smoothing: 0.05
  loss_type: "cross_entropy"
  focal_gamma: 2.0
  oversample: true                    # Balance classes via oversampling

# --- Augmentation ---
augmentation:
  rand_flip_prob: 0.5
  rand_rotate90_prob: 0.5
  rand_affine_prob: 0.5
  rand_affine_rotate_range: 0.2618
  rand_affine_scale_range: [0.85, 1.15]
  rand_intensity_shift: 0.25
  rand_intensity_scale: 0.25
  use_percentile_norm: false          # Z-score — matches ODELIA baseline
  rand_gaussian_noise_prob: 0.3
  rand_gaussian_noise_std: 0.1
  derive_sub2: false
  derive_washout: false
  crop_foreground: false

# --- Calibration ---
calibration:
  enabled: false
  temperature_init: 1.5

# --- Evaluation ---
evaluation:
  sensitivity_threshold: 0.9
  specificity_threshold: 0.9

# --- Paths ---
paths:
  output_dir: "/cluster/work/konradj/breast_mri/outputs_v13/"
  checkpoint_dir: "/cluster/work/konradj/breast_mri/outputs_v13/checkpoints/"
  log_dir: "/cluster/work/konradj/breast_mri/outputs_v13/logs/"

# --- Reproducibility ---
seed: 42
device: "auto"
